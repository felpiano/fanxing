    <!--loading-->
    <div class="dialog-div modal-loading" v-show="loading">
      <div>
        <img src="images/loading.gif" alt="">

      </div>

</body>
<script>
  new Vue({
    el: '#app',
    data(){
      return {
        loading: true,
        orderInfo: {
          tradeNo: '',
          fixedAmount: 0,
          orderStatus: -1
        },
        countDown: {
          m: 0,
          s: 0
        },
        progress: 45,
        pcent: 0,
        times: 0
      }
    },
    created() {
      const query = getUrlParam(window.location.href)
      if (JSON.stringify(query) !== '{}') {
        this.getOrderInfo(query)
      } else {
        this.loading = false
      }
    },
    methods: {
      getOrderInfo(query) {
        this.loading = false
        if (!query.orderNo || !query.time) {
          return
        }
        this.times = Number(query.time)
        if (this.isExpired(this.times)) {
          this.orderInfo.orderStatus = 1
        } else {
          this.orderInfo.orderStatus = 0
          this.showProgress()
        }
      },
      showProgress() {
        let timer = setInterval(() => {
          this.progress--
          this.pcent += 2.2
          $("#pb02").css("width", this.pcent + "%");
          if (this.progress < 1 || this.isExpired(this.times)) {
            this.orderInfo.orderStatus = 1
            this.progress = 0
            this.pcent = 0
            clearInterval(timer)
            timer = null
            setTimeout(() => {
              this.again()
            }, 1000)
          }
        }, 1000)
      },
      isExpired(time, seconds = 11) {
        const now = Date.now();
        return now > time + seconds * 1000;
      },
      again() {
        this.pcent = 0
        this.progress = 45
        $("#pb02").css("width", this.pcent + "%");
        this.showProgress()
      }
    }
  })
</script>
