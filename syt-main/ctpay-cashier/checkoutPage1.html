      </div>
      <p class="syt-pay-main_text">订单正在匹配中...</p>
      <div class="flex-center count-dowm-div">
        <p>倒计时：</p>
        <div class="count-dowm"><b>{{countDown.m}}</b>分<b>{{countDown.s}}</b>秒</div>
      </div>
      <div class="wxts">
        <p class="text-center">温馨提示</p>
        <p>1.订单即将匹配成功，请耐心等待不要刷新页面</p>
        <p>2.每个订单仅限支付一次，重复支付无法到账</p>
        <p>3.若无法支付，请复制链接到其他浏览器尝试</p>
      </div>
    </div>

      </div>
      <p class="text-center">
        获取订单信息失败，请关闭当前页面<br/>
        重新下单即可
      </p>
    </div>
  </div>
</body>

<script>
  new Vue({
    el: '#app',
    data() {
      return {
        loading: false,
        orderInfo: {
          tradeNo: '',
          fixedAmount: 0,
          orderStatus: -1
        },
        countDown: {
          m: 0,
          s: 0
        },
        progress: 30,
        pcent: 0,
        times: 0
      }
    },
    created() {
      const query = getUrlParam(window.location.href)
      if (JSON.stringify(query) !== '{}') {
        this.getOrderInfo(query)
      } else {
        this.loading = false
      }
    },
    methods: {
      getOrderInfo(query) {
        this.loading = false
        if (!query.orderNo || !query.time) {
          return
        }
        this.times = Number(query.time)
        if (this.isExpired(this.times)) {
          this.orderInfo.orderStatus = 1
        } else {
          this.orderInfo.orderStatus = 0
          this.countDownFun()
          this.showProgress()
        }
      },
      countDownFun() {
        // 倒计时
        let countDownTime = 30 * 1000
        let timer = setInterval(() => {
          if (countDownTime <= 0 || this.isExpired(this.times)) {
            this.orderInfo.orderStatus = 1
            clearInterval(timer)
            timer = null
            return
          }
          this.countDown.m = Math.floor(countDownTime / 1000 / 60)
          this.countDown.s = Math.floor(countDownTime / 1000 % 60)
          countDownTime -= 1000
        }, 1000)
      },
      isExpired(time, seconds = 11) {
        const now = Date.now();
        return now > time + seconds * 1000;
      },
      showProgress() {
        let timer = setInterval(() => {
          this.progress--
          this.pcent += 3.3
          $("#pb02").css("width", this.pcent + "%");
          if (this.progress < 1) {
            this.progress = 30
            this.pcent = 100
            clearInterval(timer)
            timer = null
            setTimeout(() => {
              this.again()
            }, 1000)
          }
        }, 1000)
      },
      again() {
        this.countDown = {
          m: 0,
          s: 0
        }
        this.pcent = 0
        this.progress = 30
        $("#pb02").css("width", this.pcent + "%");
        this.countDownFun()
        this.showProgress()
      }
    }
  })
</script>
</html>
