<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
  <meta name="renderer" content="webkit">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>收银台</title>
  <script>
    const randomNum = Math.random().toString(36).substring(7);
    document.write('<link rel="stylesheet" href="css/index.css?v=' + randomNum + '">');
    document.write('<link rel="stylesheet" href="css/wechatPay.css?v=' + randomNum + '">');
  </script>
  <script src="js/vue.js"></script>
  <script src="js/axios.min.js"></script>
  <script src="js/request_03.js"></script>
  <script src="js/jquery.js"></script>
  <script src="js/jquery.qrcode.min.js"></script>
</head>
<body>
<div id="app" v-cloak class="forward-url">
  <div v-if="orderInfo.orderStatus == -1"></div>
  <div class="forward-url_main" v-else-if="orderInfo.orderStatus === 0">
    <div class="forward-url_head">
      <div class="head-box">
        <div class="flex-center" v-if="orderInfo.showChannel === 0">
          <svg t="1754385608549" class="icon" viewBox="0 0 1025 1024" version="1.1" xmlns="http://www.w3.org/2000/svg" p-id="3484" width="22" height="22"><path d="M1024.16 694.816c0-149.92-143.104-271.392-319.584-271.392-176.576 0-319.68 121.504-319.68 271.392S528 966.208 704.576 966.208c55.456 0 107.648-12.096 153.184-33.248l125.984 54.528-14.592-140.544c34.784-43.392 55.04-95.808 55.04-152.128zM596.832 621.28c-25.152 0-45.472-20.352-45.472-45.472s20.32-45.472 45.472-45.472c25.12 0 45.44 20.384 45.44 45.472s-20.384 45.472-45.44 45.472z m215.392 0c-25.056 0-45.44-20.352-45.44-45.472s20.384-45.472 45.44-45.472c25.184 0 45.536 20.384 45.536 45.472s-20.352 45.472-45.536 45.472zM704.576 387.488c49.376 0 96.416 8.8 139.264 24.64 0.32-5.728 0.992-11.232 0.992-16.992 0-198.08-189.152-358.624-422.432-358.624C189.184 36.512 0.032 197.024 0.032 395.136c0 74.496 26.816 143.776 72.704 201.12L53.472 781.92l166.432-72.096c41.216 19.2 86.784 32.16 134.88 38.784-3.616-17.504-5.824-35.424-5.824-53.792 0.032-169.44 159.552-307.296 355.616-307.296z m-139.808-209.6c33.184 0 60 26.88 60 60 0 33.184-26.816 60.064-60 60.064s-60.032-26.88-60.032-60.064c0-33.152 26.88-60 60.032-60zM280.032 297.952c-33.184 0-60-26.88-60-60.064 0-33.152 26.848-60 60-60 33.184 0 60.032 26.88 60.032 60s-26.88 60.064-60.032 60.064z" fill="#51C332" p-id="3485"></path></svg>
          <div class="head-title">
            微信支付手机版
          </div>
        </div>
      </div>
      <div class="order-info">
        <div class="flex-center" v-if="orderInfo.nickName && orderInfo.nickName !== ''">
          姓名：
          <p class="nick-name">{{orderInfo.nickName}} </p>
          <button class="copy-text" @click="clipboard(orderInfo.nickName, '姓名')">复制</button>
        </div>
        <div class="flex-center">
          金额：
          <p class="order-amount">￥{{orderInfo.fixedAmount}} </p>
          <button class="copy-text" @click="clipboard(orderInfo.fixedAmount, '金额')">复制</button>
        </div>
      </div>
    </div>
    <div class="qrcode-box" id="alipayQrcode">
      <p class="msg-blue">截图到相册使用微信扫码完成支付</p>
      <div class="pay-image" id="qrcodeUrl">
        <img :src="orderInfo.qrcodeUrl" alt=""/>
      </div>
      <div class="qrcode-img-div" id="qrcode">
        <div class="qrcode_img"></div>
      </div>
    </div>
    <div class="link-div">
      <p class="msg-blue">或复制以下链接到微信发送给任意好友后点开链接</p>
      <div class="link-text">
        <p>{{orderInfo.accountRemark}}</p>
        <button class="copy-btn" @click="clipboard(orderInfo.accountRemark)">一键复制</button>
      </div>
    </div>
    <div class="red msg-text" v-if="orderInfo.guidance.length > 0">
      <p v-for="(item, index) in orderInfo.guidance" :key="index">
        {{item}}
      </p>
    </div>
    <div class="tx-msg">
      <h4 class="big-red">支付流程</h4>
      <div class="flex-center tx-msg-img">
        <img src="images/w__1.jpg">
        <img src="images/w__2.jpg">
      </div>
    </div>
  </div>
  <div v-else>
    <p class="order-suc" v-if="orderInfo.orderStatus === 1">订单已经支付成功了噢～</p>
    <p class="order-over" v-else-if="orderInfo.orderStatus === 2">
      当前订单已超时!<br/>
      如果你还没有付款, 重新创建新的订单即可~
    </p>
  </div>

  <div class="dialog-div" v-if="isVisible">
    <div class="dialog-div_box">
      <div class="dialog-div_body font-weight">
        <p class="dialog-title"> 请输入付款人姓名 </p>
        <p class="red text-center font-16"> 请正确填写付款微信号的真实姓名</p>
        <input type="text" v-model="payer" class="input-userName" placeholder="请输入付款人姓名">
      </div>
      <div class="dialog-div_footer">
        <button class="btn-primary" @click="submitOrder">确定</button>
      </div>
    </div>
  </div>

  <div class="dialog-div" v-if="isOverTime">
    <div class="dialog-div_box">
      <div class="dialog-div_body">
        <p class="text-center font-16">
          当前订单已超时!<br/>
          如果你还没有付款, 重新创建新的订单即可~
        </p>
      </div>
    </div>
  </div>

  <!--loading-->
  <div class="dialog-div modal-loading" v-show="loading">
    <div>
      <img src="images/loading.gif" alt="">
      <p>正在加载中...</p>
    </div>
  </div>

  <!--toast-->
  <div class="toast" v-show="toastShow">
    <p>{{ toastText }}</p>
  </div>

</div>
</body>
<script>
  var app = new Vue({
    el: '#app',
    data: {
      loading: true,
      toastText: '',
      toastShow: false,
      isVisible: false,
      isOverTime: false,
      orderInfo: {
        tradeNo: '',
        nickName: '',
        accountNumber: '',
        accountRemark: '',
        fixedAmount: 0,
        guidance: [],
        qrcodeType: 1,
        hideQrcode: 1,
        showChannel: 0,
        qrcodeUrl: '',
        orderStatus: -1,
      },
      payer: ''
    },
    created() {
      const query = getUrlParam(window.location.href)
      if (JSON.stringify(query) !== '{}') {
        this.getOrderInfo(query)
      } else {
        this.loading = false
      }
    },
    methods: {
      getOrderInfo(query) {
        if(!query.orderNo) {
          this.loading = false
          return
        }
        axios.get(API_URL.getOrderData, {
          params: {
            tradeNo: query.orderNo
          }
        }).then(res => {
          if (res.status === 200) {
            if (res.data.code !== 200) {
              this.setToast(res.data.msg)
              this.loading = false
              return
            }
            const orderData = res.data.data || {}
            if (JSON.stringify(orderData) === '{}') {
              this.setToast('当前订单暂无付款信息')
              this.loading = false
              return
            }
            this.loading = false
            if (orderData.orderStatus !== 0 ) {
              this.orderInfo.orderStatus = orderData.orderStatus
              return
            }
            const merchantQrcode = orderData.merchantQrcode || {}
            if (JSON.stringify(merchantQrcode) === '{}') {
              this.setToast('通道码异常，请重新下单～')
              return
            }
            this.isVisible = orderData.memberNameFlag === 0

            const agentChannel = orderData.agentChannel || {}
            if (agentChannel.hideQrcode === 0 || merchantQrcode.qrcodeType === 2) {
              setTimeout(() => {
                const alipayQrcode = document.getElementById('alipayQrcode')
                if (alipayQrcode) {
                  alipayQrcode.style.display = 'none'
                }
              }, 100)
            }
            if (merchantQrcode.qrcodeType === 1) {
              setTimeout(() => {
                const qrcode = document.getElementById('qrcode')
                if (qrcode) {
                  qrcode.style.display = 'none'
                }
              }, 100)
            } else if (merchantQrcode.qrcodeType === 0) {
              setTimeout(() => {
                const qrcodeUrl = document.getElementById('qrcodeUrl')
                if (qrcodeUrl) {
                  qrcodeUrl.style.display = 'none'
                }
                let url = ''
                if (merchantQrcode.channelId === 1110) {
                  url = `https://www.alipay.com/?appId=20000116&actionType=toAccount&goBack=NO&amount=${orderData.fixedAmount}&userId=${merchantQrcode.uid}&remark=${orderData.uid}&desc=shabi&memo=${orderData.uid}`
                } else {
                  url = merchantQrcode.qrcodeValue
                }
                this.getQrcode(encodeURIComponent(url))
              }, 100)
            }
            let guidance = agentChannel.guidance
            let guidanceList = []
            if (guidance && guidance !== '') {
              if(guidance.indexOf('\n') > -1) {
                guidanceList = guidance.split('\n')
              } else {
                guidanceList = [guidance]
              }
            }
            this.orderInfo = {
              tradeNo: orderData.tradeNo,
              fixedAmount: orderData.fixedAmount,
              nickName: merchantQrcode.nickName,
              guidance: guidanceList,
              qrcodeType: merchantQrcode.qrcodeType,
              hideQrcode: agentChannel.hideQrcode,
              showChannel: agentChannel.showChannel,
              orderStatus: orderData.orderStatus,
              qrcodeValue: merchantQrcode.qrcodeValue,
              qrcodeUrl: merchantQrcode.qrcodeUrl,
              accountRemark: merchantQrcode.accountRemark,
            }
          } else {
            this.loading = false
            this.setToast('请刷新重试或重新复制打开链接')
          }
        }).catch(() => {
          this.loading = false
          this.setToast('网络飞走啦，请刷新重试～')
        })
      },
      submitOrder() {
        if (!this.payer) {
          this.setToast('请输入付款人姓名')
          return
        }
        if (!/^[\u4e00-\u9fa5]+$/.test(this.payer)) {
          this.setToast('付款人姓名只能输入中文噢～')
          return
        }
        this.loading = true
        axios.get(API_URL.setOrderPayer, {
          params: {
            tradeNo: this.orderInfo.tradeNo,
            payer: this.payer
          }
        }).then(res => {
          if (res.status === 200) {
            if (res.data.code !== 200) {
              this.setToast(res.data.msg)
              return
            }
            this.isVisible = false
          } else {
            this.setToast('提交失败')
          }
        }).catch(() => {
          this.setToast('提交失败')
        }).finally(() => {
          this.loading = false
        })
      },
      clipboard(text) {
        navigator.clipboard.writeText(text).then(() => {
          this.setToast('复制成功')
        }, (err) => {
          console.log(err)
        })
      },
      //生成二维码
      getQrcode(url){
        $(".qrcode_img").qrcode({
          render: "canvas",
          width: 288,
          height: 288,
          text: decodeURIComponent(url)
        });
        $('.qrcode_img').find('canvas').css({'width': 288,'height': 288});
      },
      setToast(text) {
        this.toastText = text
        this.toastShow = true
        setTimeout(() => {
          this.toastShow = false
        }, 2000)
      }
    }
  })
</script>
</html>
