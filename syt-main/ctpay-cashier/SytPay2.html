<script>
  new Vue({
    el: '#app',
    data(){
      return {
        loading: true,
        orderInfo: {
          tradeNo: '',
          fixedAmount: 0,
          orderStatus: -1
        },
        countDown: {
          m: 0,
          s: 0
        },
        progress: 45,
        pcent: 0
      }
    },
    created() {
      const query = getUrlParam(window.location.href)
      if (JSON.stringify(query) !== '{}') {
        this.getOrderInfo(query)
      } else {
        this.loading = false
      }
    },
    methods: {
      getOrderInfo(query) {
        if (!query.orderNo) {
          this.loading = false
          return
        }
        axios.get(API_URL.getOrderData, {
          params: {
            tradeNo: query.orderNo
          }
        }).then(res => {
          if (res.status === 200) {
            if (res.data.code !== 200) {
              this.loading = false
              return
            }
            const orderData = res.data.data || {}
            if (JSON.stringify(orderData) === '{}') {
              this.loading = false
              return
            }
            this.loading = false
            if (orderData.orderStatus !== 0 ) {
              this.orderInfo.orderStatus = orderData.orderStatus
              return
            }

            this.orderInfo = {
              tradeNo: orderData.tradeNo,
              fixedAmount: orderData.fixedAmount,
              orderStatus: orderData.orderStatus
            }
            this.showProgress()
          } else {
            this.loading = false
          }
        }).catch(() => {
          this.loading = false
        })
      },
      clipboard(className, text) {
        let clipboard = new ClipboardJS('.' + className);
        clipboard.on('success', (e) => {
          this.setToast(text + '复制成功')
        });
        clipboard.on('error', (e) => {
          this.setToast(text + '复制失败')
        });
      },
      showProgress() {
        let timer = setInterval(() => {
          this.progress--
          this.pcent += 2.2
          $("#pb02").css("width", this.pcent + "%");
          if (this.progress < 1) {
            this.progress = 0
            this.pcent = 0
            clearInterval(timer)
            timer = null
            setTimeout(() => {
              this.again()
            }, 1000)
          }
        }, 1000)
      },
      again() {
        this.pcent = 0
        this.progress = 45
        $("#pb02").css("width", this.pcent + "%");
        this.showProgress()
      }
    }
  })
</script>
